<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Ops Desk — Expiry & Recruitment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F5F6F8; --card:#FFFFFF; --ink:#14213D; --muted:#5A6478;
  --pine:#1C2E54; --pine-soft:#E7EBF4; --marigold:#C9A227; --marigold-soft:#F6EFD8;
  --brick:#C4553B; --brick-soft:#F7E4DF; --line:#DBE0E8;
  --mono:'IBM Plex Mono',ui-monospace,monospace; --disp:'Archivo',sans-serif; --body:'Public Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:var(--body);font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--pine);outline-offset:1px}
label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}

/* ===== LOGIN ===== */
#loginScreen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{background:var(--card);border-radius:14px;padding:34px 32px;width:100%;max-width:380px}
.login-card h1{font-family:var(--disp);font-weight:800;font-size:22px;margin-bottom:2px}
.login-card .sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:22px}
.login-card .field{margin-bottom:14px}
.login-err{color:var(--brick);font-size:12.5px;margin-top:10px;min-height:18px}
.login-hint{margin-top:16px;font-size:11.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px}
.login-hint code{font-family:var(--mono);background:var(--pine-soft);padding:1px 6px;border-radius:4px}

header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:2px solid var(--ink);background:var(--card);flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:-.01em}
.brand h1::before{content:"";display:inline-block;width:10px;height:10px;background:var(--marigold);border-radius:2px;margin-right:9px;vertical-align:1px}
.brand span{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hdr-actions{display:flex;gap:8px;align-items:center}
.who{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-right:4px}
.btn{border:1px solid var(--ink);background:var(--card);color:var(--ink);border-radius:7px;padding:7px 13px;font-weight:600;font-size:12.5px}
.btn:hover{background:var(--pine-soft)}
.btn.primary{background:var(--pine);border-color:var(--pine);color:#fff;width:auto}
.btn.primary:hover{background:#16264A}
.btn.block{width:100%}
.btn.small{padding:4px 9px;font-size:11.5px;border-radius:6px}
.btn.danger{background:#fff;border-color:var(--brick);color:var(--brick)}
.btn.danger:hover{background:var(--brick-soft)}

.queue{background:var(--ink);color:#EDF0F6;padding:10px 22px;display:flex;gap:10px;align-items:center;overflow-x:auto}
.queue .q-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9AA8C4;white-space:nowrap;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:7px;background:#22304F;border:1px solid #39496F;border-radius:999px;padding:5px 12px;font-size:12px;white-space:nowrap;color:#EDF0F6;flex-shrink:0}
.chip:hover{border-color:var(--marigold)}
.chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.warn{background:var(--marigold)} .dot.danger{background:#E06A55} .dot.ok{background:#4E9B6E}
.chip b{font-family:var(--mono);font-weight:600}
.queue .clear{font-size:12px;color:#9AA8C4;white-space:nowrap}

nav{display:flex;gap:2px;padding:0 22px;background:var(--card);border-bottom:1px solid var(--line);overflow-x:auto}
nav button{background:none;border:none;border-bottom:3px solid transparent;padding:12px 16px;font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--muted);white-space:nowrap}
nav button.active{color:var(--ink);border-bottom-color:var(--marigold)}
nav button:hover{color:var(--ink)}

main{padding:20px 22px 60px;max-width:1180px;margin:0 auto}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.two{grid-template-columns:1fr 1fr}
@media(max-width:840px){.two{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px}
.card h3{font-family:var(--disp);font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card h3 .meta{font-family:var(--mono);font-size:11px;text-transform:none;letter-spacing:0;font-weight:500}
.kpi .num{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1.1}
.kpi .lbl{font-size:12px;color:var(--muted);margin-top:3px}
.kpi.alert .num{color:var(--brick)} .kpi.warn .num{color:#A5821B} .kpi.good .num{color:var(--pine)}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:6px 8px;border-bottom:2px solid var(--ink)}
td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
td.mono{font-family:var(--mono);font-size:12px}
tr:hover td{background:#F8F9FB}
td select{width:auto;min-width:120px;padding:4px 7px;font-size:12px}
.tag{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:999px}
.tag.expired{background:var(--brick);color:#fff}
.tag.due{background:var(--marigold-soft);color:#7A6210}
.tag.ok{background:var(--pine-soft);color:var(--pine)}
.tag.stage-Applied{background:#ECEFF4;color:#5A6478}
.tag.stage-Screening{background:var(--marigold-soft);color:#7A6210}
.tag.stage-Interview{background:#E4ECF5;color:#2E4E7D}
.tag.stage-Offer{background:#F0E4F5;color:#6E2E7D}
.tag.stage-Hired{background:var(--pine);color:#fff}
.tag.stage-Rejected{background:var(--brick-soft);color:var(--brick)}
.tag.open{background:var(--pine-soft);color:var(--pine)}
.tag.pr-High{background:var(--brick-soft);color:var(--brick)}
.tag.pr-Medium{background:var(--marigold-soft);color:#7A6210}
.tag.pr-Low{background:#ECEFF4;color:#5A6478}
.tag.bt{background:var(--pine);color:#fff}
.tag.bd{background:var(--brick);color:#fff}
.btn.bt{background:var(--pine);border-color:var(--pine);color:#fff}
.btn.bt:hover{background:#16264A}
.btn.bd{background:#fff;border-color:var(--brick);color:var(--brick)}
.btn.bd:hover{background:var(--brick-soft)}
.tag.hold{background:var(--marigold-soft);color:#7A6210}
.tag.closed{background:#ECEFF4;color:#5A6478}

.formrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.section-note{font-size:12.5px;color:var(--muted);margin:6px 0 0}
.empty{padding:22px;text-align:center;color:var(--muted);font-size:13px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
a.mailbtn{display:inline-block;font-size:11.5px;color:var(--pine);font-weight:600;text-decoration:none;border:1px solid var(--pine);border-radius:6px;padding:3px 8px;white-space:nowrap}
a.mailbtn:hover{background:var(--pine-soft)}
a.mailbtn.big{font-size:12.5px;padding:7px 13px;border-radius:7px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
@media (prefers-reduced-motion: reduce){.toast{transition:none}}
@media print{
  header .hdr-actions, .queue, nav, .no-print{display:none !important}
  header{border-bottom:2px solid #000}
  body{background:#fff}
  .card{break-inside:avoid;border-color:#bbb}
  main{padding:10px 0;max-width:100%}
}
#appShell{display:none}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <h1>HR Ops Desk</h1>
    <div class="sub">Winner Holistic Consultants L.L.C. — Sign in to continue</div>
    <div class="field"><label>Username</label><input id="lg-user" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lg-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn primary block" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="lg-err"></div>
    <div class="login-hint">Default credentials: <code>admin</code> / <code>hr@2026</code><br>Change them in <b>Settings</b> after signing in.</div>
  </div>
</div>

<div id="appShell">
<header>

    <button class="btn" onclick="exportData()">Export data</button>

    <button class="btn" onclick="logout()">Log out</button>

</header>

<div class="queue" id="queue"></div>

/* ============ HELPERS ============ */
const fmt = s => { const dt=new Date(s+"T00:00:00"); return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); };
const daysTo = s => Math.round((new Date(s+"T00:00:00") - today)/DAY);
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const opening = id => state.openings.find(o=>o.id===id) || {role:"—",dept:"—"};
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

function docStatus(doc){
  const n = daysTo(doc.expiry);
  const maxWin = Math.max(...state.settings.reminderDays, 0);
  if(n < 0) return {cls:"expired", label:"EXPIRED "+Math.abs(n)+"d ago", sev:2, n};
  if(n <= maxWin) return {cls:"due", label:"Due in "+n+"d", sev:1, n};
  return {cls:"ok", label:"OK · "+n+"d", sev:0, n};
}

/* A reminder is "due" for a doc when days-to-expiry has crossed a reminder mark
   that hasn't been marked as sent yet (or the doc has expired). */
function dueReminders(doc){
  const n = daysTo(doc.expiry);
  const marks = [...state.settings.reminderDays].sort((a,b)=>b-a);
  return marks.filter(m => n <= m && !(doc.sent||[]).includes(m));
}

function reminderMailto(docs){
  const to = state.settings.reminderEmail;
  const lines = docs.map(x=>{
    const st = docStatus(x);
    return "• "+x.doc+" — "+x.holder+" (Ref: "+x.ref+")\n  Expiry: "+fmt(x.expiry)+" — "+st.label;
  }).join("\n\n");
  const subject = docs.length===1
    ? "Renewal reminder: "+docs[0].doc+" — "+docStatus(docs[0]).label
    : "Renewal reminders: "+docs.length+" documents need attention";
  const body = "Hi,\n\nThe following document"+(docs.length>1?"s":"")+" require"+(docs.length>1?"":"s")+" renewal action:\n\n"+lines+"\n\nPlease initiate renewal.\n\n— HR Ops Desk";
  return "mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
}


/* ============ SUPABASE CLOUD ============ */
const sb = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseAnonKey);
const WORKSPACE_ID = APP_CONFIG.workspaceId || "winnerhc-main";
let cloudReady = false;
let saveTimer = null;
let applyingRemote = false;
let cloudChannel = null;

const authEmail = username =>
  `${String(username||"").trim().toLowerCase()}@${APP_CONFIG.authDomain || "winnerhc.local"}`;

function businessState(){
  const {users, ...data} = state;
  return data;
}

function normalizeCloudState(data){
  const p = data || {};
  if(!p.settings) p.settings = {reminderEmail:"hr@company.com", reminderDays:[30,20,15,10]};
  if(!p.docs) p.docs = [];
  if(!p.openings) p.openings = [];
  if(!p.tasks) p.tasks = [];
  if(!p.candidates) p.candidates = [];
  if(!p.nextId) p.nextId = 1000;
  p.openings.forEach(o=>{
    if(!o.experience) o.experience = "Not specified";
    if(!o.positionsRequired) o.positionsRequired = 1;
    if(!o.location) o.location = "Not specified";
    if(o.remarks == null) o.remarks = "";
    if(!["New Hire","Replacement"].includes(o.status)) o.status = "New Hire";
  });
  p.tasks.forEach(t=>{
    if(t.status==="Done") t.status="BT";
    else if(t.status==="In progress") t.status="To do";
  });
  return p;
}

async function loadProfiles(){
  const {data, error} = await sb.from("profiles")
    .select("id, full_name, username, role, perms")
    .eq("workspace_id", WORKSPACE_ID)
    .order("full_name");
  if(error) throw error;
  state.users = (data||[]).map(u=>({
    id:u.id,
    fullName:u.full_name,
    user:u.username,
    role:u.role,
    perms:u.role==="Admin" ? [...ALL_PERMS] : (u.perms||[])
  }));
}

async function loadCloudState(){
  const {data, error} = await sb.from("workspace_state")
    .select("data")
    .eq("workspace_id", WORKSPACE_ID)
    .single();
  if(error) throw error;

  const users = state.users || [];
  const remote = normalizeCloudState(data.data);
  state = {...remote, users};
}

async function saveCloudNow(){
  if(!cloudReady || applyingRemote || !session) return;
  const payload = businessState();
  const {error} = await sb.from("workspace_state")
    .update({data:payload, updated_at:new Date().toISOString()})
    .eq("workspace_id", WORKSPACE_ID);
  if(error){
    console.error(error);
    toast("Cloud save failed. Check connection.");
  }
}

function persist(){
  if(!cloudReady || applyingRemote || !session) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCloudNow, 250);
}

async function refreshFromCloud(){
  if(!session) return;
  try{
    applyingRemote = true;
    await loadProfiles();
    await loadCloudState();
    const fresh = state.users.find(u=>u.id===session.id || u.user===session.user);
    if(fresh) session = fresh;
    renderNav();
    renderQueue(); renderDash(); renderTasks(); renderRec(); renderExpiry(); renderKPI(); renderMaster(); renderSettings();
  }catch(err){
    console.error(err);
  }finally{
    applyingRemote = false;
  }
}

function startRealtime(){
  if(cloudChannel) sb.removeChannel(cloudChannel);
  cloudChannel = sb.channel("winnerhc-cloud-"+WORKSPACE_ID)
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"workspace_state",filter:`workspace_id=eq.${WORKSPACE_ID}`},()=>refreshFromCloud())
    .on("postgres_changes",{event:"*",schema:"public",table:"profiles",filter:`workspace_id=eq.${WORKSPACE_ID}`},()=>refreshFromCloud())
    .subscribe();
}

/* ============ LOGIN ============ */
async function doLogin(){
  const u = document.getElementById('lg-user').value.trim().toLowerCase();
  const p = document.getElementById('lg-pass').value;
  document.getElementById('lg-err').textContent = '';

  if(!u || !p){
    document.getElementById('lg-err').textContent = 'Enter username and password.';
    return;
  }

  const {data:authData, error:authError} = await sb.auth.signInWithPassword({
    email: authEmail(u),
    password: p
  });

  if(authError){
    document.getElementById('lg-err').textContent = 'Invalid username or password.';
    document.getElementById('lg-pass').value = '';
    return;
  }

  try{
    await loadProfiles();
    const match = state.users.find(x=>x.id===authData.user.id && x.user.toLowerCase()===u);
    if(!match) throw new Error("No active profile found for this user.");

    session = match;
    await loadCloudState();

/* ============ SVG CHARTS ============ */
function funnelChart(){
  const f = {};
  ["Applied","Screening","Interview","Offer","Hired"].forEach(s=>f[s]=0);
  state.candidates.forEach(c=>{
    const idx = STAGES.indexOf(c.stage);
    if(c.stage==="Rejected") { f.Applied++; return; }
    // count candidate at every stage they have passed through
    ["Applied","Screening","Interview","Offer","Hired"].forEach((s,i)=>{ if(i<=idx) f[s]++; });
  });
  const stages = Object.entries(f); const max = Math.max(stages[0][1],1);
  const W=480, rowH=34, H=stages.length*rowH+6;
  let s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Recruitment funnel">';
  stages.forEach(([k,v],i)=>{
    const w = Math.max(4,(v/max)*(W-150)); const y=i*rowH+4;
    s += '<text x="0" y="'+(y+16)+'" font-size="11" font-family="IBM Plex Mono" fill="#5A6478">'+k.toUpperCase()+'</text>';
    s += '<rect x="105" y="'+y+'" width="'+w+'" height="22" rx="4" fill="'+(i===stages.length-1?'#1C2E54':'#8FA3C8')+'"/>';
    s += '<text x="'+(110+w)+'" y="'+(y+16)+'" font-size="12" font-weight="600" font-family="IBM Plex Mono" fill="#14213D">'+v+'</text>';
  });
  return s+'</svg>';
}
function expiryTimeline(){
  const docs = [...state.docs].sort((a,b)=>daysTo(a.expiry)-daysTo(b.expiry)).slice(0,7);
  const maxWin = Math.max(...state.settings.reminderDays, 30);
  const W=480, rowH=30, H=docs.length*rowH+22, x0=150, span=W-x0-40, horizon=Math.max(maxWin*2,60);
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Expiry timeline">';
  // today line
  s+='<line x1="'+x0+'" y1="0" x2="'+x0+'" y2="'+(H-16)+'" stroke="#14213D" stroke-width="1.5" stroke-dasharray="3,3"/>';
  s+='<text x="'+x0+'" y="'+(H-4)+'" font-size="10" text-anchor="middle" font-family="IBM Plex Mono" fill="#5A6478">TODAY</text>';
  docs.forEach((x,i)=>{
    const n=daysTo(x.expiry); const y=i*rowH+6;
    const px = x0 + Math.max(-x0+20, Math.min(span, (n/horizon)*span));
    const col = n<0 ? '#C4553B' : (n<=maxWin ? '#C9A227' : '#1C2E54');
    s+='<text x="0" y="'+(y+12)+'" font-size="10.5" font-family="IBM Plex Mono" fill="#5A6478">'+esc(x.doc).slice(0,20).toUpperCase()+'</text>';
    s+='<line x1="'+x0+'" y1="'+(y+8)+'" x2="'+px+'" y2="'+(y+8)+'" stroke="'+col+'" stroke-width="2"/>';
    s+='<circle cx="'+px+'" cy="'+(y+8)+'" r="5" fill="'+col+'"/>';
    s+='<text x="'+(px+(n<0?-10:10))+'" y="'+(y+12)+'" font-size="10.5" text-anchor="'+(n<0?'end':'start')+'" font-family="IBM Plex Mono" fill="#14213D">'+(n<0?Math.abs(n)+'d ago':n+'d')+'</text>';
  });
  return s+'</svg>';
}

/* Parses posts in your WhatsApp group format:
   "Today's Task" / "Task Date : 13/07/2026" headers, dd/mm/yyyy dates,
   numbered lines, and "Additional Task" sections. */
function parseTaskPost(text, taskOwner = session ? (session.fullName || session.user) : "Unknown"){
  const lines = text.split(/\r?\n/);
  let curDate = d(0), extra = false, added = 0, skipped = 0;
  const parseDate = s => {
    const m = s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
    if(!m) return null;
    let [_, dd, mm, yy] = m;
    yy = yy.length===2 ? "20"+yy : yy;
    dd = String(dd).padStart(2, "0");
    mm = String(mm).padStart(2, "0");
    const dt = new Date(+yy, +mm-1, +dd);
    if(isNaN(dt) || dt.getFullYear()!==+yy || dt.getMonth()!==+mm-1 || dt.getDate()!==+dd) return null;
    return `${yy}-${mm}-${dd}`;
  };
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    const dt = parseDate(line);
    if(dt && !/^\s*\d+[\.\)]/.test(line)){ curDate = dt; extra = false; continue; }   // date line or "Task Date : .."
    if(/additional/i.test(line)){ extra = true; continue; }
    if(/^today'?s task/i.test(line) || /^planned\.?$/i.test(line) || /^task date/i.test(line)) continue;
    const item = line.match(/^\d+[\.\)]\s*(.+)$/);
    if(item){
      let title = item[1].trim(), status = "To do", doneOn = null;
      const outcome = title.match(/[\s\-–]*\(?(BT|BD)\)?\s*$/);   // trailing BT / BD = outcome already posted
      if(outcome){ status = outcome[1].toUpperCase(); doneOn = curDate; title = title.slice(0, outcome.index).trim(); }
      title = title.replace(/\s*[-–]\s*[A-Z]{1,3}\s*$/,"").trim(); // strip other trailing initials
      if(!title) continue;
      const dupIdx = state.tasks.findIndex(t=>t.due===curDate && (t.name||"").toLowerCase()===taskOwner.toLowerCase() && t.title.toLowerCase()===title.toLowerCase());
      if(dupIdx>=0){
        // same task re-posted with an outcome → update it instead of duplicating
        if(status!=="To do" && state.tasks[dupIdx].status==="To do"){ state.tasks[dupIdx].status=status; state.tasks[dupIdx].doneOn=doneOn; added++; }
        else skipped++;
        continue;
      }
      state.tasks.push({id:state.nextId++, name:taskOwner, title, due:curDate, priority:"Medium", repeat:"None", status, doneOn, extra});
      added++;
    }
  }
  return {added, skipped};
}
function importPost(){
  const box = document.getElementById('tk-paste');
  const text = box.value.trim();
  const taskOwner = session ? (session.fullName || session.user) : "Unknown";

  if(!r.added && !r.skipped){ toast("Couldn't find numbered task lines — check the format."); return; }

}

function addTask(){
  const name = session ? (session.fullName || session.user) : "Unknown";
  const title=document.getElementById('tk-title').value.trim();
  const due=document.getElementById('tk-due').value || d(0);
  const priority=document.getElementById('tk-priority').value;
  const repeat=document.getElementById('tk-repeat').value;
  const extra=document.getElementById('tk-type').value==="extra";
  if(!title){ toast("Task title is required."); return; }
  state.tasks.push({id:state.nextId++, name, title, due, priority, repeat, status:"To do", doneOn:null, extra});
  toast(extra ? "Added under Additional tasks for "+fmt(due)+"." : "Added as a planned task for "+fmt(due)+".");
  renderAll(); showTab('tasks');
}
function toggleTaskType(id){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.extra = !t.extra;
  toast('"'+t.title.slice(0,40)+'" moved to '+(t.extra?"Additional":"Planned")+" tasks.");
  renderAll(); showTab('tasks');
}
function completeTask(id, outcome){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  outcome = outcome==="BD" ? "BD" : "BT";
  t.status=outcome; t.doneOn=d(0);
  if(t.repeat==="Daily" || t.repeat==="Weekly"){
    const step = t.repeat==="Daily" ? 1 : 7;
    const base = new Date(Math.max(new Date(t.due+"T00:00:00").getTime(), today.getTime()) + step*DAY);
    state.tasks.push({id:state.nextId++, name:t.name || (session ? (session.fullName || session.user) : "Unknown"), title:t.title, due:dFromDate(base),
      priority:t.priority, repeat:t.repeat, status:"To do", doneOn:null, extra:t.extra});
    toast((outcome==="BT"?"Break Through ✓":"Break Down ✗")+" — next "+t.repeat.toLowerCase()+" occurrence scheduled.");
  } else { toast(outcome==="BT" ? "Break Through ✓ — completed." : "Break Down ✗ — logged as not completed."); }
  renderAll(); showTab(document.querySelector('nav button.active').dataset.tab);
}
function undoTask(id){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.status="To do"; t.doneOn=null; renderAll(); showTab('tasks');
}
function removeTask(id){ state.tasks = state.tasks.filter(t=>t.id!==id); toast("Task removed."); renderAll(); showTab('tasks'); }

function addOpening(){
  const role = document.getElementById('op-role').value.trim();
  const dept = document.getElementById('op-dept').value.trim() || "General";
  const experience = document.getElementById('op-exp').value.trim() || "Not specified";
  const positionsRequired = Math.max(1, parseInt(document.getElementById('op-positions').value,10) || 1);
  const location = document.getElementById('op-location').value.trim() || "Not specified";
  const status = document.getElementById('op-status').value;

  if(!role){ toast("Role is required."); return; }

  state.openings.push({
    id: state.nextId++,
    role,
    dept,
    experience,
    positionsRequired,
    location,
    status,
    remarks: "",
    opened: d(0)
  });

  toast("Opening added."); renderAll(); showTab('rec');
}

function editOpening(id){
  const o = state.openings.find(x=>x.id===id);
  if(!o) return;

  const role = prompt("Role", o.role);
  if(role === null) return;
  if(!role.trim()){ toast("Role is required."); return; }

  const dept = prompt("Department", o.dept || "");
  if(dept === null) return;

  const experience = prompt("Years of experience requested", o.experience || "Not specified");
  if(experience === null) return;

  const positionsRaw = prompt("No. of positions required", o.positionsRequired || 1);
  if(positionsRaw === null) return;
  const positionsRequired = parseInt(positionsRaw, 10);
  if(!Number.isFinite(positionsRequired) || positionsRequired < 1){
    toast("Positions required must be at least 1.");
    return;
  }

  const hired = state.candidates.filter(c=>c.openingId===id && c.stage==="Hired").length;
  if(positionsRequired < hired){
    toast("Positions required cannot be less than "+hired+" already hired candidate(s).");
    return;
  }

  const location = prompt("Location", o.location || "Not specified");
  if(location === null) return;

  const status = prompt("Status: enter New Hire or Replacement", o.status || "New Hire");
  if(status === null) return;

  const normalizedStatus = status.trim().toLowerCase();
  let finalStatus;
  if(normalizedStatus === "new hire") finalStatus = "New Hire";
  else if(normalizedStatus === "replacement") finalStatus = "Replacement";
  else {
    toast("Status must be New Hire or Replacement.");
    return;
  }

  const remarks = prompt("Remarks", o.remarks || "");
  if(remarks === null) return;

  o.role = role.trim();
  o.dept = dept.trim() || "General";
  o.experience = experience.trim() || "Not specified";
  o.positionsRequired = positionsRequired;
  o.location = location.trim() || "Not specified";
  o.status = finalStatus;
  o.remarks = remarks.trim();

  toast('Position "'+o.role+'" updated.');
  renderAll();
  showTab('rec');
}

function setOpeningStatus(id, status){
  const o=state.openings.find(x=>x.id===id); if(!o) return;
  o.status=status;
  toast("Hiring type updated to "+status+".");
  renderAll(); showTab('rec');
}

function setOpeningRemarks(id, remarks){
  const o=state.openings.find(x=>x.id===id); if(!o) return;
  o.remarks=remarks;
  persist();
}

function removeOpening(id){
  const o=state.openings.find(x=>x.id===id); if(!o) return;
  const linked = state.candidates.filter(c=>c.openingId===id);
  const msg = linked.length
    ? 'Remove "'+o.role+'"? This will also delete its '+linked.length+' candidate(s). This cannot be undone.'
    : 'Remove "'+o.role+'"? This cannot be undone.';
  if(!confirm(msg)) return;
  state.openings = state.openings.filter(x=>x.id!==id);
  state.candidates = state.candidates.filter(c=>c.openingId!==id);
  toast('Position "'+o.role+'" removed'+(linked.length?' with '+linked.length+' candidate(s)':'')+'.');
  renderAll(); showTab('rec');
}

function addCandidate(){
  const name=document.getElementById('cd-name').value.trim();
  const contact=document.getElementById('cd-contact').value.trim();
  const openingId=+document.getElementById('cd-open').value;
  const note=document.getElementById('cd-note').value.trim();
  if(!name){ toast("Candidate name is required."); return; }
  state.candidates.push({id:state.nextId++, name, contact, openingId, stage:"Applied", note, updated:d(0)});
  toast("Candidate added at Applied stage."); renderAll(); showTab('rec');
}

function setStage(id, stage){
  const c=state.candidates.find(x=>x.id===id); if(!c) return;
  c.stage=stage; c.updated=d(0);
  toast(c.name+" moved to "+stage+". Position counts updated.");
  renderAll(); showTab('rec');
}

function setNote(id, note){
  const c=state.candidates.find(x=>x.id===id); if(!c) return;
  c.note=note; c.updated=d(0); persist(); renderQueue(); renderDash();
}

function removeCandidate(id){
  state.candidates = state.candidates.filter(c=>c.id!==id);
  toast("Candidate removed. Position counts updated.");
  renderAll(); showTab('rec');
}

async function addUser(){
  const fullName = document.getElementById('nu-fullname').value.trim();
  const user = document.getElementById('nu-user').value.trim().toLowerCase();
  const pass = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;

  if(!isAdmin()){ toast("Only an Admin can add users."); return; }
  if(!fullName || !user || !pass){ toast("Full name, username and password are required."); return; }
  if(!/^[a-z0-9._-]+$/.test(user)){ toast("Username can use letters, numbers, dot, underscore and hyphen only."); return; }
  if(pass.length < 8){ toast("Password must be at least 8 characters."); return; }
  if(state.users.some(u=>u.user.toLowerCase()===user)){ toast("That username already exists."); return; }
  if(role==="Member" && !perms.length){ toast("Give the Member access to at least one tab."); return; }

  const {data, error} = await sb.functions.invoke("manage-user", {

      action:"create",
      workspaceId:WORKSPACE_ID,
      fullName,
      username:user,
      password:pass,
      role,
      perms:role==="Admin" ? [...ALL_PERMS] : perms
    }
  });

  if(error || !data?.ok){
    console.error(error || data);
    toast(data?.error || "Unable to create user.");

  }

  await refreshFromCloud();
  toast(fullName+" ("+user+") added.");
  showTab('settings');
}

async function togglePerm(username, tab, allowed){
  if(!isAdmin()){ toast("Only an Admin can change access."); return; }
  const u = state.users.find(x=>x.user===username); if(!u) return;

  let perms = [...(u.perms||[])];
  if(allowed){ if(!perms.includes(tab)) perms.push(tab); }
  else perms = perms.filter(p=>p!==tab);

  const {error} = await sb.from("profiles").update({perms}).eq("id",u.id);
  if(error){ console.error(error); toast("Permission update failed."); return; }

  u.perms = perms;
  toast(username+" — "+(TABS.find(t=>t.id===tab)||{}).label+" "+(allowed?"allowed":"removed")+".");
}

async function removeUser(username){
  if(!isAdmin()){ toast("Only an Admin can remove users."); return; }
  if(session && username===session.user){ toast("You can't remove your own account while signed in."); return; }

  const target = state.users.find(u=>u.user===username);
  if(!target) return;
  if(target.role==="Admin" && state.users.filter(u=>u.role==="Admin").length<=1){
    toast("Can't remove the last Admin."); return;

  if(!confirm('Remove user "'+username+'"?')) return;

  const {data, error} = await sb.functions.invoke("manage-user", {

  });

  if(error || !data?.ok){
    console.error(error || data);
    toast(data?.error || "Unable to remove user.");
    return;

  await refreshFromCloud();

  showTab('settings');
}

/* ============ KPI / MIS ============ */
function trendChart(rows){ // rows: [{lbl, due, done}]
  const W=760,H=190,pad=30; const max=Math.max(...rows.map(r=>r.due),1);
  const bw=Math.min(18,(W-pad-10)/rows.length/2.6), group=(W-pad-10)/rows.length;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" role="img" aria-label="Tasks due vs completed per day">';
  for(let g=0;g<=max;g+=Math.max(1,Math.ceil(max/4))){ const y=H-26-(g/max)*(H-60);
    s+='<line x1="'+pad+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="#E5E9F0"/>';
    s+='<text x="'+(pad-6)+'" y="'+(y+4)+'" font-size="10" text-anchor="end" font-family="IBM Plex Mono" fill="#98A1B3">'+g+'</text>'; }
  rows.forEach((r,i)=>{ const x0=pad+6+i*group;
    const dH=(r.due/max)*(H-60), oH=(r.done/max)*(H-60);
    s+='<rect x="'+x0+'" y="'+(H-26-dH)+'" width="'+bw+'" height="'+Math.max(dH,1)+'" rx="2" fill="#CBD4E4"/>';
    s+='<rect x="'+(x0+bw+2)+'" y="'+(H-26-oH)+'" width="'+bw+'" height="'+Math.max(oH,1)+'" rx="2" fill="#1C2E54"/>';
    s+='<text x="'+(x0+bw)+'" y="'+(H-10)+'" font-size="9.5" text-anchor="middle" font-family="IBM Plex Mono" fill="#5A6478">'+r.lbl+'</text>'; });
  return s+'</svg>';
}
function gauge(pct, label, color){
  const p = Math.max(0,Math.min(100,pct));
  return `<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${label}</span><b class="mono" style="font-family:var(--mono)">${isFinite(pct)?p.toFixed(0)+'%':'—'}</b></div>
    <div style="height:8px;background:#ECEFF4;border-radius:99px"><div style="height:8px;width:${isFinite(pct)?p:0}%;background:${color};border-radius:99px"></div></div>
  </div>`;
}
function renderKPI(){
  const el = document.getElementById('tab-kpi');
  const win = state.kpiWindow || 14;

  /* ---- Task performance: Monday to Friday only ---- */
  const isWorkingDay = dateStr => {
    const day = new Date(dateStr+"T00:00:00").getDay();
    return day >= 1 && day <= 5;
  };

  const inWin = t => {
    const n = daysTo(t.due);
    return n <= 0 && n > -win && isWorkingDay(t.due);
  };

  const duePast = state.tasks.filter(inWin);
  const closedPast = duePast.filter(t=>t.status==="BT" || t.status==="BD");
  const btPast = closedPast.filter(t=>t.status==="BT");
  const onTime = btPast.filter(t=>t.doneOn && t.doneOn <= t.due);
  const completion = duePast.length ? (closedPast.length/duePast.length*100) : NaN;
  const btRate = closedPast.length ? (btPast.length/closedPast.length*100) : NaN;
  const onTimeRate = btPast.length ? (onTime.length/btPast.length*100) : NaN;
  const overdueNow = state.tasks.filter(t=>t.status==="To do" && daysTo(t.due)<0 && isWorkingDay(t.due)).length;
  const planned = duePast.filter(t=>!t.extra).length, addl = duePast.filter(t=>t.extra).length;
  const addlShare = duePast.length ? (addl/duePast.length*100) : NaN;

  let workingDays = 0;
  for(let i=win-1;i>=0;i--){
    if(isWorkingDay(d(-i))) workingDays++;
  }
  const avgPerDay = (duePast.length / Math.max(workingDays,1)).toFixed(1);

  // daily trend — Monday to Friday only
  const trend = [];
  for(let i=win-1;i>=0;i--){
    const date = d(-i);
    if(!isWorkingDay(date)) continue;
    const dayTasks = state.tasks.filter(t=>t.due===date);
    const dt = new Date(date+"T00:00:00");
    trend.push({
      lbl: dt.getDate()+"/"+(dt.getMonth()+1),
      due: dayTasks.length,
      done: dayTasks.filter(t=>t.status==="BT").length
    });
  }

  /* ---- Recruitment performance ---- */
  const conv = (a,b)=>{ // % of candidates who reached stage a that also reached b
    const reach = s => state.candidates.filter(c=>{
      if(c.stage==="Rejected") return s==="Applied";
      return STAGES.indexOf(c.stage) >= STAGES.indexOf(s);
    }).length;
    const A=reach(a), B=reach(b);
    return A ? (B/A*100) : NaN;
  };
  const openPos = state.openings.filter(o=>o.status==="Open");
  const avgOpenDays = openPos.length ? Math.round(openPos.reduce((a,o)=>a+Math.abs(daysTo(o.opened)),0)/openPos.length) : 0;
  const hiredWin = state.candidates.filter(c=>c.stage==="Hired" && daysTo(c.updated) > -win).length;
  const rejectRate = state.candidates.length ? (state.candidates.filter(c=>c.stage==="Rejected").length/state.candidates.length*100) : NaN;

  /* ---- Compliance ---- */
  const expiredNow = state.docs.filter(x=>daysTo(x.expiry)<0).length;
  const inWindowDocs = state.docs.filter(x=>{const n=daysTo(x.expiry); return n>=0 && n<=Math.max(...state.settings.reminderDays,0);});
  const remDiscipline = inWindowDocs.length
    ? (inWindowDocs.filter(x=>dueReminders(x).length===0).length/inWindowDocs.length*100) : NaN;

  /* ---- Weekly MIS table: Monday to Friday, last 4 work weeks ---- */
  const weeks = [];
  const currentDay = today.getDay();
  const daysSinceMonday = currentDay === 0 ? 6 : currentDay - 1;
  const currentMonday = new Date(today.getTime() - daysSinceMonday * DAY);

  const localDateStr = dt => {
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const day = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  };

  for(let w=3;w>=0;w--){
    const monday = new Date(currentMonday.getTime() - w * 7 * DAY);
    const friday = new Date(monday.getTime() + 4 * DAY);
    const start = localDateStr(monday);
    const end = localDateStr(friday);

    const rows = state.tasks.filter(t =>
      t.due >= start &&
      t.due <= end &&
      isWorkingDay(t.due)
    );

    const closedR = rows.filter(t=>t.status==="BT"||t.status==="BD");
    const btR = closedR.filter(t=>t.status==="BT");

    weeks.push({
      label: fmt(start)+" – "+fmt(end),
      total: rows.length,
      bt: btR.length,
      bd: closedR.length-btR.length,
      comp: rows.length ? Math.round(closedR.length/rows.length*100) : null,
      btp: closedR.length ? Math.round(btR.length/closedR.length*100) : null
    });
  }

  const na = v => isFinite(v) ? v.toFixed(0)+"%" : "—";
  el.innerHTML = `
    <div class="card no-print" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:10px">
        <label style="margin:0">Analysis window</label>
        <select style="width:auto" onchange="state.kpiWindow=+this.value; renderAll(); showTab('kpi')">
          ${[7,14,30,60,90].map(v=>`<option value="${v}" ${win===v?'selected':''}>Last ${v} days</option>`).join('')}
        </select>
      </div>
      <button class="btn primary" onclick="window.print()">🖨 Print / save as PDF report</button>
    </div>

    <div class="grid kpis" style="margin-bottom:14px">
      <div class="card kpi ${btRate>=80?'good':btRate>=50?'warn':'alert'}"><div class="num">${na(btRate)}</div><div class="lbl">Break Through rate (BT)</div></div>
      <div class="card kpi ${completion>=80?'good':completion>=50?'warn':'alert'}"><div class="num">${na(completion)}</div><div class="lbl">Tasks closed (${win}d · Mon–Fri)</div></div>
      <div class="card kpi ${onTimeRate>=80?'good':'warn'}"><div class="num">${na(onTimeRate)}</div><div class="lbl">BT on time</div></div>
      <div class="card kpi ${overdueNow?'alert':'good'}"><div class="num">${overdueNow}</div><div class="lbl">Overdue backlog now</div></div>
      <div class="card kpi"><div class="num">${avgPerDay}</div><div class="lbl">Avg tasks / working day</div></div>
      <div class="card kpi"><div class="num">${hiredWin}</div><div class="lbl">Hired (${win}d)</div></div>
      <div class="card kpi ${avgOpenDays>45?'warn':''}"><div class="num">${avgOpenDays}d</div><div class="lbl">Avg position age (open)</div></div>
    </div>

    <div class="card" style="margin-bottom:14px"><h3>Daily workload — tasks logged vs Break Through <span class="meta">Monday–Friday only · last ${win} days</span></h3>
      ${trendChart(trend)}
      <div class="legend"><span><i style="background:#CBD4E4"></i>Tasks due</span><span><i style="background:#1C2E54"></i>Break Through (BT)</span></div>
    </div>

    <div class="grid two" style="margin-bottom:14px">
      <div class="card"><h3>Recruitment conversion</h3>
        ${gauge(conv("Applied","Screening"),"Applied → Screening","#8FA3C8")}
        ${gauge(conv("Screening","Interview"),"Screening → Interview","#6D82AC")}
        ${gauge(conv("Interview","Offer"),"Interview → Offer","#3D5488")}
        ${gauge(conv("Offer","Hired"),"Offer → Hired","#1C2E54")}
        ${gauge(rejectRate,"Rejection rate (all candidates)","#C4553B")}
      </div>
      <div class="card"><h3>Workload mix &amp; compliance</h3>
        ${gauge(100-addlShare,"Planned tasks — "+planned+" of "+duePast.length,"#1C2E54")}
        ${gauge(addlShare,"Additional (unplanned) — "+addl+" of "+duePast.length,"#C9A227")}
        ${gauge(remDiscipline,"Renewal reminders sent on schedule","#1C2E54")}
        <p class="section-note">High "additional" share means the day is being driven by ad-hoc work — useful evidence for planning discussions. ${expiredNow?'<b style="color:var(--brick)">'+expiredNow+' document(s) currently expired.</b>':'No documents currently expired.'}</p>
      </div>
    </div>

    <div class="card"><h3>Weekly MIS summary <span class="meta">Monday to Friday only</span></h3>
      <table><thead><tr><th>Week</th><th>Tasks logged</th><th>BT</th><th>BD</th><th>Closed %</th><th>BT rate</th></tr></thead><tbody>
      ${weeks.map(w=>`<tr><td class="mono">${w.label}</td><td class="mono">${w.total}</td>
        <td class="mono" style="color:var(--pine)">${w.bt}</td><td class="mono" style="color:var(--brick)">${w.bd}</td>
        <td class="mono" style="color:${w.comp===null?'inherit':w.comp>=80?'var(--pine)':w.comp>=50?'#7A6210':'var(--brick)'}">${w.comp===null?'—':w.comp+'%'}</td>
        <td class="mono">${w.btp===null?'—':w.btp+'%'}</td></tr>`).join('')}
      </tbody></table>
      <p class="section-note">BT = Break Through (completed) · BD = Break Down (not completed). Generated ${fmt(d(0))} · HR Ops Desk. Use "Print / save as PDF" above to share this page as your MIS report.</p>
    </div>`;
}

/* ============ EXPORT / IMPORT ============ */
function exportData(){
  const blob = new Blob([JSON.stringify(businessState(),null,2)],{type:"application/json"});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = "hr-ops-data-"+d(0)+".json"; a.click(); URL.revokeObjectURL(a.href);
  toast("Data exported — import it next session to continue.");
}
function importData(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { try { const parsed = JSON.parse(r.result);
      if(!parsed.docs || !parsed.candidates || !parsed.settings) throw new Error("bad shape");
      if(!parsed.users) parsed.users = parsed.auth
        ? [{user:parsed.auth.user, pass:parsed.auth.pass, role:"Admin", perms:["dash","tasks","rec","expiry","kpi","master","leave"]}]
        : [{user:"admin", pass:"hr@2026", role:"Admin", perms:["dash","tasks","rec","expiry","kpi","master","leave"]}];
      parsed.users.forEach(u=>{ if(!u.perms) u.perms = ["dash","tasks","rec","expiry","kpi"]; if(!u.fullName) u.fullName = u.user; });
      if(!parsed.tasks) parsed.tasks = [];
      if(!parsed.openings) parsed.openings = [];
      parsed.openings.forEach(o=>{
        if(!o.experience) o.experience = "Not specified";
        if(!o.positionsRequired) o.positionsRequired = 1;
        if(!o.location) o.location = "Not specified";
        if(o.remarks == null) o.remarks = "";
        if(!["New Hire","Replacement"].includes(o.status)) o.status = "New Hire";
      });
      parsed.tasks.forEach(t=>{ if(t.status==="Done") t.status="BT"; else if(t.status==="In progress") t.status="To do"; });
      state = {...normalizeCloudState(parsed), users:state.users}; persist(); toast("Data imported to shared workspace."); renderAll();
    } catch(e){ toast("Import failed — that file isn't a valid HR Ops export."); } };
  r.readAsText(f); ev.target.value = "";
}

/* ============ CLOUD BACKUP / RESET ============ */
async function resetData(){
  if(!isAdmin()){ toast("Only an Admin can reset workspace data."); return; }
  if(!confirm("Reset shared cloud workspace data to the sample data currently loaded? This affects all users.")) return;
  await saveCloudNow();
  toast("Cloud workspace saved.");
}

/* ============ BOOT ============ */
function renderAll(){
  persist();
  renderQueue(); renderDash(); renderTasks(); renderRec(); renderExpiry(); renderKPI(); renderMaster(); renderSettings();
}
document.getElementById('todayLbl').textContent = today.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
</script>
